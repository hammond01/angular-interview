<article class="panel">
  <div class="panel__header">
    <div>
      <p class="eyebrow">Active step</p>
      <h2>{{ step().title }}</h2>
    </div>

    <button class="button button--small" type="button" (click)="toggleCurrentStep()">
      {{ step().done ? 'Mark as open' : 'Mark done' }}
    </button>
  </div>

  <p class="detail-copy">{{ step().summary }}</p>

  <ul class="bullet-list">
    @for (bullet of step().bullets; track bullet) {
      <li>{{ bullet }}</li>
    }
  </ul>

  <div class="code-card">
    <span class="code-card__label">Quick example</span>
    <code>{{ step().sample }}</code>
  </div>

  <div class="talking-points">
    @for (point of talkingPoints(); track point.title) {
      <section class="talk-card">
        <h3>{{ point.title }}</h3>
        <p>{{ point.text }}</p>
      </section>
    }
  </div>
</article>
