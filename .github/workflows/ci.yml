name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check --if-present

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --run

      - name: Build application
        run: npm run build

      - name: Check bundle size
        shell: bash
        run: |
          MAIN_FILE=$(find dist -name "main-*.js" -type f | head -n 1)

          if [ -z "$MAIN_FILE" ]; then
            echo "No main bundle found in dist"
            exit 0
          fi

          SIZE=$(stat -c%s "$MAIN_FILE")
          echo "Bundle: $MAIN_FILE"
          echo "Bundle size: $((SIZE / 1024)) KB"

          if [ "$SIZE" -gt 200000 ]; then
            echo "Warning: Bundle size exceeds 200KB"
          fi

  accessibility-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
